name: Build and Package R2-D2 Monitor

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build Windows Executable
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'
        cache: true

    - name: Install dependencies
      run: go mod download

    - name: Build Executable
      run: |
        go build -v -o r2d2-monitor.exe ./cmd/r2d2-monitor

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: r2d2-monitor-windows-x64
        path: r2d2-monitor.exe
        if-no-files-found: error
        retention-days: 7
